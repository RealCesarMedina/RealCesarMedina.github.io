# ==========================================================
# Configuración del panel de administración
# Sveltia CMS · drop-in compatible con Decap CMS / Netlify CMS
# ==========================================================

backend:
  name: github
  repo: RealCesarMedina/RealCesarMedina.github.io
  branch: main
  # Sveltia CMS usa autenticación hospedada gratuita por defecto.
  # Si en el futuro se desea auto-hospedar, configurar base_url y auth_endpoint.

# ==========================================================
# Carpeta de subidas (PDFs, imágenes, etc.)
# ==========================================================
media_folder: assets/docs
public_folder: /assets/docs

# Sin flujo editorial: cada cambio se publica directo a main.
publish_mode: simple

# Metadatos del sitio
site_url: https://realcesarmedina.github.io
display_url: https://realcesarmedina.github.io
logo_url: https://realcesarmedina.github.io/

# Idioma de la interfaz
locale: es

# ==========================================================
# Colecciones — qué se puede editar
# ==========================================================
collections:
  # ----------------------------------------------------------
  # PUBLICACIONES — listado completo (proyectos + opinión)
  # ----------------------------------------------------------
  - name: publicaciones
    label: 'Publicaciones'
    label_singular: 'Publicación'
    description: 'Investigaciones (PDF) y artículos de opinión (HTML) que aparecen en la página principal.'
    icon: article
    files:
      - name: lista
        file: data/posts.json
        label: 'Listado completo'
        description: 'Añade, edita o elimina publicaciones desde aquí. Los cambios se publican al guardar.'
        format: json
        json:
          indent_size: 2
        fields:
          - name: posts
            label: 'Publicaciones'
            label_singular: 'Publicación'
            widget: list
            summary: '{{fields.title}}'
            collapsed: true
            min: 0
            add_to_top: true
            fields:
              - name: id
                label: 'ID'
                widget: number
                value_type: int
                min: 1
                hint: 'Número único interno (1, 2, 3, …). Cualquier número que no esté usado.'

              - name: type
                label: 'Tipo'
                widget: select
                options:
                  - { label: 'Investigación / Estudio (PDF)', value: 'proyecto' }
                  - { label: 'Artículo de opinión (HTML)',    value: 'opinion'  }
                default: 'proyecto'

              - name: title
                label: 'Título'
                widget: string
                hint: 'Título completo de la publicación.'

              - name: date
                label: 'Fecha'
                widget: datetime
                date_format: 'YYYY-MM-DD'
                time_format: false
                picker_utc: false
                format: 'YYYY-MM-DD'
                hint: 'Fecha de publicación.'

              - name: description
                label: 'Descripción'
                widget: text
                hint: 'Resumen breve (2 a 4 líneas) que se muestra debajo del título en la lista.'

              - name: tags
                label: 'Etiquetas'
                widget: list
                default: []
                hint: 'Una etiqueta por elemento. Ej.: Macroeconomía, Inflación, Política Monetaria.'

              - name: url
                label: 'Enlace al documento'
                widget: string
                hint: |-
                  Para INVESTIGACIONES: usa la pestaña "Asset Library" arriba para subir el PDF, copia la ruta resultante (ej: ./assets/docs/nombre.pdf) y pégala aquí.
                  Para ARTÍCULOS de opinión: ./articles/nombre-articulo.html

              - name: secondaryUrl
                label: 'Enlace secundario'
                widget: string
                required: false
                default: ''
                hint: 'Opcional. Por ejemplo, una versión secundaria o un mirror.'

              - name: featured
                label: 'Pieza destacada en el hero'
                widget: boolean
                default: false
                hint: 'Si está activada y es la más reciente, aparece en la tarjeta destacada del homepage.'
