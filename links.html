  <style>
    :root {
      --paper:     #faf9f6;
      --paper-dim: #f3f1ec;
      --ink:       #14130f;
      --ink-2:     #3a3833;
      --rule:      #e2dfd7;
      --accent:    #7a1416;
      --muted:     #7a766c;
      --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;
      --font-body:    'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-body);
      color: var(--ink-2);
      background: var(--paper);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      display: flex;
      flex-direction: column;
    }

    a { color: var(--ink); text-decoration: none; transition: color .2s ease, border-color .2s ease, background .2s ease; }
    ::selection { background: var(--ink); color: var(--paper); }

    .wrap {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: clamp(56px, 9vw, 96px) 28px 48px;
      flex: 1;
    }

    /* Encabezado */
    .lt-head { text-align: center; margin-bottom: clamp(36px, 6vw, 56px); }

    .lt-monogram {
      width: 76px;
      height: 76px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: var(--ink);
      color: var(--paper);
      display: grid;
      place-items: center;
      font-family: var(--font-display);
      font-size: 1.9rem;
      letter-spacing: 0.02em;
    }

    .lt-name {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(1.9rem, 6vw, 2.5rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin: 0 0 10px;
      color: var(--ink);
    }

    .lt-sub {
      font-family: var(--font-display);
      font-style: italic;
      color: var(--muted);
      margin: 0;
      font-size: 1.05rem;
    }

    /* Lista de enlaces */
    .lt-links { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 14px; }

    .lt-link {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border: 1px solid var(--rule);
      background: var(--paper);
      border-radius: 14px;
      color: var(--ink);
      font-weight: 500;
      font-size: 1.02rem;
    }
    .lt-link:hover {
      border-color: var(--ink);
      background: var(--paper-dim);
    }
    .lt-link svg { width: 22px; height: 22px; flex: 0 0 22px; }
    .lt-link .lt-label { flex: 1; }
    .lt-link .lt-arrow { color: var(--muted); font-size: 1.1rem; }
    .lt-link:hover .lt-arrow { color: var(--accent); }

    /* Pie */
    .lt-foot {
      text-align: center;
      padding: 28px;
      color: var(--muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--rule);
    }
    .lt-foot a { color: var(--muted); border-bottom: 1px solid transparent; }
    .lt-foot a:hover { color: var(--ink); border-color: var(--ink); }
  </style>
</head>
